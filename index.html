<!-- To refresh data in future: just re-run python3 scripts/scrape_ssl.py && python3 scripts/convert_to_gtfs.py. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faroe Islands Public Transport</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: radial-gradient(circle at top left, #1e3a5f 0%, #0d1824 50%, #060d16 100%);
      background-attachment: fixed;
      color: #e8edf2;
      min-height: 100vh;
      letter-spacing: 0.01em;
    }

    header {
      background: rgba(10, 20, 35, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(77, 184, 255, 0.15);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.01em; }
    header span { font-size: 0.82rem; color: #7a9bbf; }

    .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #4db8ff, #1a7fc1 60%, #0d4f7a);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(77, 184, 255, 0.35);
    }

    main { max-width: 1040px; margin: 0 auto; padding: 32px 20px 64px; }

    /* ── Planner ── */
    .planner {
      background: linear-gradient(180deg, rgba(22, 36, 54, 0.9), rgba(15, 28, 42, 0.9));
      border: 1px solid rgba(77, 184, 255, 0.18);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 36px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .planner h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .swap-btn {
      align-self: flex-end;
      padding: 0;
      width: 36px;
      height: 46px;
      border-radius: 10px;
      border: 1px solid rgba(77, 184, 255, 0.3);
      background: rgba(77, 184, 255, 0.08);
      color: #4db8ff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .swap-btn:hover { background: rgba(77, 184, 255, 0.2); color: #7dd3ff; }

    .field-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #7a9bbf;
    }

    .planner select,
    .planner input[type="date"],
    .planner input[type="time"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(77, 184, 255, 0.22);
      background: #0d1c2c;
      color: #e8edf2;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .planner select:focus,
    .planner input:focus {
      border-color: #4db8ff;
      box-shadow: 0 0 0 3px rgba(77, 184, 255, 0.15);
    }

    .datetime-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .now-btn {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(77, 184, 255, 0.3);
      background: rgba(77, 184, 255, 0.08);
      color: #4db8ff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .now-btn:hover { background: rgba(77, 184, 255, 0.18); }

    .find-btn {
      width: 100%;
      padding: 14px 24px;
      margin-top: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4db8ff, #1a7fc1);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 20px rgba(26, 127, 193, 0.35);
    }

    .find-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(26, 127, 193, 0.5);
    }

    .find-btn:active { transform: translateY(0); }

    @media (max-width: 600px) {
      .planner-grid { grid-template-columns: 1fr auto; }
      .planner-grid .field:last-of-type { grid-column: 1 / -1; }
      .swap-btn { align-self: flex-end; }
      .datetime-row { grid-template-columns: 1fr 1fr; }
      .now-btn { grid-column: 1 / -1; }
    }

    /* Journey result */
    #journey-result { margin-top: 20px; }

    /* Journey cards (collapsible, one per alternative journey) */
    .journey-card {
      border: 1px solid #2a4a6b;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .journey-card:hover { border-color: #3a6a9a; }
    .journey-card.active { border-color: #4db8ff; }

    .journey-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      background: #0f1c2a;
      font-size: 0.85rem;
    }
    .journey-card.active .journey-card-header { background: #0d2235; }

    .jc-time {
      font-weight: 700;
      color: #e8edf2;
      flex: 1;
      white-space: nowrap;
    }
    .jc-badge {
      min-width: 32px;
      height: 22px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.72rem;
      padding: 0 6px;
    }
    .jc-dur {
      color: #7a9bbf;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .jc-xfer {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #0d4f2a;
      color: #4dff8a;
      white-space: nowrap;
    }
    .jc-xfer.has-xfer {
      background: #2a1a00;
      color: #ffb84d;
    }

    .journey-card-body {
      display: none;
      padding: 12px 16px;
      background: #0a1520;
      border-top: 1px solid #1a2e44;
    }
    .journey-card.active .journey-card-body { display: block; }

    .journey-error {
      color: #ff7a7a;
      font-size: 0.88rem;
      padding: 12px;
      background: #2a1010;
      border-radius: 8px;
      border: 1px solid #5a1a1a;
    }

    .journey-summary {
      font-size: 0.82rem;
      color: #7a9bbf;
      margin-bottom: 14px;
    }

    .leg {
      background: #162436;
      border: 1px solid #2a4a6b;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .leg-badge {
      min-width: 46px;
      height: 46px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .badge-ferry   { background: #0d4f7a; color: #4db8ff; }
    .badge-bus     { background: #0d4f2a; color: #4dff8a; }
    .badge-express { background: #4a1a6a; color: #d48dff; }
    .badge-airport { background: #5a3a00; color: #ffb84d; }

    .leg-body { flex: 1; min-width: 0; }

    .leg-route {
      font-weight: 600;
      font-size: 0.88rem;
      color: #c8dff0;
    }

    .leg-direction {
      font-size: 0.92rem;
      font-weight: 700;
      margin: 2px 0 4px;
    }

    .leg-via {
      font-size: 0.77rem;
      color: #5a7a9a;
    }

    .leg-note {
      font-size: 0.75rem;
      color: #b88a30;
      margin-top: 4px;
    }

    .leg-on-demand {
      font-size: 0.75rem;
      color: #ffc84d;
      background: #2a1e00;
      border: 1px solid #6b4d00;
      border-radius: 6px;
      padding: 4px 8px;
      margin: 4px 0;
    }
    .jc-on-demand {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 10px;
      background: #2a1e00;
      color: #ffc84d;
      border: 1px solid #6b4d00;
      white-space: nowrap;
    }

    .leg-timetable {
      font-size: 0.75rem;
      color: #4db8ff;
      text-decoration: none;
      display: inline-block;
      margin-top: 6px;
    }

    .leg-timetable:hover { text-decoration: underline; }

    .leg-departures {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1a2e44;
      font-size: 0.78rem;
      color: #7a9bbf;
    }

    .leg-departures-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4a6a8a;
      margin-bottom: 4px;
    }

    .dep-time {
      display: inline-block;
      background: #0f2a3a;
      border: 1px solid #1a4a6a;
      border-radius: 5px;
      padding: 2px 8px;
      margin: 2px 4px 2px 0;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4db8ff;
    }

    .dep-time.next {
      background: #0a3a1a;
      border-color: #1a6a3a;
      color: #4dff8a;
    }

    .dep-day { font-size: 0.72rem; color: #4a6a8a; margin-left: 2px; }

    .no-sched { color: #4a6a8a; font-style: italic; font-size: 0.78rem; margin-top: 6px; }

    #journey-map {
      height: 320px;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid #2a4a6b;
    }

    .network-wrap {
      position: relative;
      margin-bottom: 36px;
    }

    #network-map {
      height: 520px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(77, 184, 255, 0.18);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .map-legend {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(15, 28, 42, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(77, 184, 255, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.78rem;
      color: #c8dff0;
      z-index: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .map-legend .lg {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-legend i {
      width: 18px;
      height: 4px;
      border-radius: 2px;
      display: inline-block;
    }

    /* Override Leaflet popup to match dark theme */
    .leaflet-tooltip {
      background: #0f1c2a;
      border: 1px solid #2a4a6b;
      color: #e8edf2;
      font-size: 0.8rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-shadow: none;
    }

    .leaflet-tooltip::before { border-top-color: #2a4a6b; }

    .transfer-arrow {
      text-align: center;
      color: #3a5a7a;
      font-size: 0.8rem;
      padding: 4px 0;
      letter-spacing: 1px;
    }

    /* ── Section titles ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #7a9bbf;
      margin-bottom: 12px;
      margin-top: 32px;
    }

    .count-pill {
      display: inline-block;
      background: #1a2e44;
      color: #7a9bbf;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Search ── */
    .search-bar {
      width: 100%;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #2a4a6b;
      background: #0f1c2a;
      color: #e8edf2;
      font-size: 1rem;
      margin-bottom: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar:focus { border-color: #4db8ff; }
    .search-bar::placeholder { color: #4a6a8a; }

    /* ── Route grid ── */
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      margin-bottom: 4px;
    }

    .route-card {
      background: #0f1c2a;
      border: 1px solid #2a4a6b;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    .route-card:hover { border-color: #4db8ff; background: #162436; }

    .route-badge {
      min-width: 44px; height: 44px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem;
    }

    .route-info { flex: 1; min-width: 0; }

    .route-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .route-type { font-size: 0.73rem; color: #7a9bbf; margin-top: 2px; }
    .route-arrow { color: #2a4a6b; font-size: 1rem; }

    .hidden { display: none !important; }

    .no-results {
      text-align: center;
      color: #4a6a8a;
      padding: 48px 0;
      font-size: 0.95rem;
    }

    /* ── Todo ── */
    .todo-section {
      margin-top: 48px;
      background: #0f1c2a;
      border: 1px solid #2a4a6b;
      border-radius: 12px;
      padding: 24px;
    }

    .todo-section h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a2e44;
      font-size: 0.88rem;
    }

    .todo-item:last-child { border-bottom: none; }

    .todo-status {
      width: 20px; height: 20px;
      border-radius: 50%;
      flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
    }

    .status-done    { background: #1a5c2a; color: #4dff8a; }
    .status-pending { background: #1a2e44; color: #4a6a8a; border: 1px solid #2a4a6b; }
    .status-wip     { background: #3a2a00; color: #ffb84d; }

    .todo-label { line-height: 1.4; }
    .todo-label.done { color: #4a6a8a; text-decoration: line-through; }
    .todo-note { font-size: 0.76rem; color: #4a6a8a; margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">FI</div>
  <div>
    <h1>Faroe Islands Public Transport</h1>
    <span>Strandfaraskip Landsins — ssl.fo</span>
  </div>
</header>

<main>

  <!-- ── Journey Planner ── -->
  <div class="planner">
    <h2>Plan Your Journey</h2>
    <div class="planner-grid">
      <div class="field">
        <label class="field-label" for="from-stop">From</label>
        <select id="from-stop"><option value="">Choose a stop…</option></select>
      </div>
      <button type="button" class="swap-btn" id="swap-btn" title="Swap from/to">⇅</button>
      <div class="field">
        <label class="field-label" for="to-stop">To</label>
        <select id="to-stop"><option value="">Choose a stop…</option></select>
      </div>
      <div class="field full">
        <label class="field-label">Departure</label>
        <div class="datetime-row">
          <input type="date" id="travel-date" />
          <input type="time" id="travel-time" />
          <button type="button" class="now-btn">Now</button>
        </div>
      </div>
    </div>
    <button class="find-btn">Find Route</button>
    <div id="gtfs-loading" style="padding:0.75rem 0;color:#aaa;font-size:0.9rem;">Loading schedule data…</div>
    <div id="journey-result"></div>
    <div id="journey-map" class="hidden"></div>
  </div>

  <!-- ── Full Network Map ── -->
  <div class="section-title" style="margin-top: 0;">Route Network</div>
  <div class="network-wrap">
    <div id="network-map"></div>
    <div class="map-legend">
      <span class="lg"><i style="background:#4db8ff"></i>Ferry</span>
      <span class="lg"><i style="background:#4dff8a"></i>Bus</span>
      <span class="lg"><i style="background:#d48dff"></i>Express</span>
      <span class="lg"><i style="background:#ffb84d"></i>Airport</span>
    </div>
  </div>

  <!-- ── Route Browser ── -->
  <input class="search-bar" id="search" type="text"
    placeholder="Search routes by location or number…"
    autocomplete="off" />

  <div id="ferry-section">
    <div class="section-title">Ferries (Oyggjaleiðir) <span class="count-pill" id="ferry-count">7</span></div>
    <div class="route-grid" id="ferry-grid"></div>
  </div>

  <div id="bus-section">
    <div class="section-title">Buses (Bygdaleiðir) <span class="count-pill" id="bus-count">22</span></div>
    <div class="route-grid" id="bus-grid"></div>
  </div>

  <div class="no-results hidden" id="no-results">No routes match your search.</div>

</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
