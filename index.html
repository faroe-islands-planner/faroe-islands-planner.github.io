<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faroe Islands Public Transport</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: radial-gradient(circle at top left, #1e3a5f 0%, #0d1824 50%, #060d16 100%);
      background-attachment: fixed;
      color: #e8edf2;
      min-height: 100vh;
      letter-spacing: 0.01em;
    }

    header {
      background: rgba(10, 20, 35, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(77, 184, 255, 0.15);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.01em; }
    header span { font-size: 0.82rem; color: #7a9bbf; }

    .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #4db8ff, #1a7fc1 60%, #0d4f7a);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(77, 184, 255, 0.35);
    }

    main { max-width: 1040px; margin: 0 auto; padding: 32px 20px 64px; }

    /* ── Planner ── */
    .planner {
      background: linear-gradient(180deg, rgba(22, 36, 54, 0.9), rgba(15, 28, 42, 0.9));
      border: 1px solid rgba(77, 184, 255, 0.18);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 36px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .planner h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .field-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #7a9bbf;
    }

    .planner select,
    .planner input[type="date"],
    .planner input[type="time"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(77, 184, 255, 0.22);
      background: #0d1c2c;
      color: #e8edf2;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .planner select:focus,
    .planner input:focus {
      border-color: #4db8ff;
      box-shadow: 0 0 0 3px rgba(77, 184, 255, 0.15);
    }

    .datetime-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .now-btn {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(77, 184, 255, 0.3);
      background: rgba(77, 184, 255, 0.08);
      color: #4db8ff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .now-btn:hover { background: rgba(77, 184, 255, 0.18); }

    .find-btn {
      width: 100%;
      padding: 14px 24px;
      margin-top: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4db8ff, #1a7fc1);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 20px rgba(26, 127, 193, 0.35);
    }

    .find-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(26, 127, 193, 0.5);
    }

    .find-btn:active { transform: translateY(0); }

    @media (max-width: 600px) {
      .planner-grid { grid-template-columns: 1fr; }
      .datetime-row { grid-template-columns: 1fr 1fr; }
      .now-btn { grid-column: 1 / -1; }
    }

    /* Journey result */
    #journey-result { margin-top: 20px; }

    .journey-error {
      color: #ff7a7a;
      font-size: 0.88rem;
      padding: 12px;
      background: #2a1010;
      border-radius: 8px;
      border: 1px solid #5a1a1a;
    }

    .journey-summary {
      font-size: 0.82rem;
      color: #7a9bbf;
      margin-bottom: 14px;
    }

    .leg {
      background: #162436;
      border: 1px solid #2a4a6b;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .leg-badge {
      min-width: 46px;
      height: 46px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .badge-ferry   { background: #0d4f7a; color: #4db8ff; }
    .badge-bus     { background: #0d4f2a; color: #4dff8a; }
    .badge-express { background: #4a1a6a; color: #d48dff; }
    .badge-airport { background: #5a3a00; color: #ffb84d; }

    .leg-body { flex: 1; min-width: 0; }

    .leg-route {
      font-weight: 600;
      font-size: 0.88rem;
      color: #c8dff0;
    }

    .leg-direction {
      font-size: 0.92rem;
      font-weight: 700;
      margin: 2px 0 4px;
    }

    .leg-via {
      font-size: 0.77rem;
      color: #5a7a9a;
    }

    .leg-note {
      font-size: 0.75rem;
      color: #b88a30;
      margin-top: 4px;
    }

    .leg-timetable {
      font-size: 0.75rem;
      color: #4db8ff;
      text-decoration: none;
      display: inline-block;
      margin-top: 6px;
    }

    .leg-timetable:hover { text-decoration: underline; }

    .leg-departures {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1a2e44;
      font-size: 0.78rem;
      color: #7a9bbf;
    }

    .leg-departures-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4a6a8a;
      margin-bottom: 4px;
    }

    .dep-time {
      display: inline-block;
      background: #0f2a3a;
      border: 1px solid #1a4a6a;
      border-radius: 5px;
      padding: 2px 8px;
      margin: 2px 4px 2px 0;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4db8ff;
    }

    .dep-time.next {
      background: #0a3a1a;
      border-color: #1a6a3a;
      color: #4dff8a;
    }

    .dep-day { font-size: 0.72rem; color: #4a6a8a; margin-left: 2px; }

    .no-sched { color: #4a6a8a; font-style: italic; font-size: 0.78rem; margin-top: 6px; }

    #journey-map {
      height: 320px;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid #2a4a6b;
    }

    .network-wrap {
      position: relative;
      margin-bottom: 36px;
    }

    #network-map {
      height: 520px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(77, 184, 255, 0.18);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .map-legend {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(15, 28, 42, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(77, 184, 255, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.78rem;
      color: #c8dff0;
      z-index: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .map-legend .lg {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-legend i {
      width: 18px;
      height: 4px;
      border-radius: 2px;
      display: inline-block;
    }

    /* Override Leaflet popup to match dark theme */
    .leaflet-tooltip {
      background: #0f1c2a;
      border: 1px solid #2a4a6b;
      color: #e8edf2;
      font-size: 0.8rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-shadow: none;
    }

    .leaflet-tooltip::before { border-top-color: #2a4a6b; }

    .transfer-arrow {
      text-align: center;
      color: #3a5a7a;
      font-size: 0.8rem;
      padding: 4px 0;
      letter-spacing: 1px;
    }

    /* ── Section titles ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #7a9bbf;
      margin-bottom: 12px;
      margin-top: 32px;
    }

    .count-pill {
      display: inline-block;
      background: #1a2e44;
      color: #7a9bbf;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Search ── */
    .search-bar {
      width: 100%;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #2a4a6b;
      background: #0f1c2a;
      color: #e8edf2;
      font-size: 1rem;
      margin-bottom: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar:focus { border-color: #4db8ff; }
    .search-bar::placeholder { color: #4a6a8a; }

    /* ── Route grid ── */
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      margin-bottom: 4px;
    }

    .route-card {
      background: #0f1c2a;
      border: 1px solid #2a4a6b;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    .route-card:hover { border-color: #4db8ff; background: #162436; }

    .route-badge {
      min-width: 44px; height: 44px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem;
    }

    .route-info { flex: 1; min-width: 0; }

    .route-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .route-type { font-size: 0.73rem; color: #7a9bbf; margin-top: 2px; }
    .route-arrow { color: #2a4a6b; font-size: 1rem; }

    .hidden { display: none !important; }

    .no-results {
      text-align: center;
      color: #4a6a8a;
      padding: 48px 0;
      font-size: 0.95rem;
    }

    /* ── Todo ── */
    .todo-section {
      margin-top: 48px;
      background: #0f1c2a;
      border: 1px solid #2a4a6b;
      border-radius: 12px;
      padding: 24px;
    }

    .todo-section h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a2e44;
      font-size: 0.88rem;
    }

    .todo-item:last-child { border-bottom: none; }

    .todo-status {
      width: 20px; height: 20px;
      border-radius: 50%;
      flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
    }

    .status-done    { background: #1a5c2a; color: #4dff8a; }
    .status-pending { background: #1a2e44; color: #4a6a8a; border: 1px solid #2a4a6b; }
    .status-wip     { background: #3a2a00; color: #ffb84d; }

    .todo-label { line-height: 1.4; }
    .todo-label.done { color: #4a6a8a; text-decoration: line-through; }
    .todo-note { font-size: 0.76rem; color: #4a6a8a; margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">FI</div>
  <div>
    <h1>Faroe Islands Public Transport</h1>
    <span>Strandfaraskip Landsins — ssl.fo</span>
  </div>
</header>

<main>

  <!-- ── Journey Planner ── -->
  <div class="planner">
    <h2>Plan Your Journey</h2>
    <div class="planner-grid">
      <div class="field">
        <label class="field-label" for="from-stop">From</label>
        <select id="from-stop"><option value="">Choose a stop…</option></select>
      </div>
      <div class="field">
        <label class="field-label" for="to-stop">To</label>
        <select id="to-stop"><option value="">Choose a stop…</option></select>
      </div>
      <div class="field full">
        <label class="field-label">Departure</label>
        <div class="datetime-row">
          <input type="date" id="travel-date" />
          <input type="time" id="travel-time" />
          <button type="button" class="now-btn" onclick="setNow()">Now</button>
        </div>
      </div>
    </div>
    <button class="find-btn" onclick="planJourney()">Find Route</button>
    <div id="journey-result"></div>
    <div id="journey-map" class="hidden"></div>
  </div>

  <!-- ── Full Network Map ── -->
  <div class="section-title" style="margin-top: 0;">Route Network</div>
  <div class="network-wrap">
    <div id="network-map"></div>
    <div class="map-legend">
      <span class="lg"><i style="background:#4db8ff"></i>Ferry</span>
      <span class="lg"><i style="background:#4dff8a"></i>Bus</span>
      <span class="lg"><i style="background:#d48dff"></i>Express</span>
      <span class="lg"><i style="background:#ffb84d"></i>Airport</span>
    </div>
  </div>

  <!-- ── Route Browser ── -->
  <input class="search-bar" id="search" type="text"
    placeholder="Search routes by location or number…"
    oninput="filterRoutes()" autocomplete="off" />

  <div id="ferry-section">
    <div class="section-title">Ferries (Oyggjaleiðir) <span class="count-pill" id="ferry-count">7</span></div>
    <div class="route-grid" id="ferry-grid"></div>
  </div>

  <div id="bus-section">
    <div class="section-title">Buses (Bygdaleiðir) <span class="count-pill" id="bus-count">22</span></div>
    <div class="route-grid" id="bus-grid"></div>
  </div>

  <div class="no-results hidden" id="no-results">No routes match your search.</div>

</main>

<script>
// ── Travel time controls ─────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, "0"); }

function setNow() {
  const d = new Date();
  document.getElementById("travel-date").value =
    `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
  document.getElementById("travel-time").value =
    `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function getTravelTime() {
  const dateStr = document.getElementById("travel-date").value;
  const timeStr = document.getElementById("travel-time").value;
  if (!dateStr || !timeStr) return new Date();
  const [y, mo, da] = dateStr.split("-").map(Number);
  const [h, mi]     = timeStr.split(":").map(Number);
  return new Date(y, mo - 1, da, h, mi);
}

// ── Schedule data (departure times per route, direction, day-of-week) ───────
// Keys: route id → direction label → day index (0=Sun…6=Sat) → sorted HH:MM list

const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// Find the matching schedule direction for a leg (forward or reverse on the route)
function findSchedDir(routeId, fromStop, toStop) {
  const sched = SCHEDULES[routeId];
  if (!sched) return null;
  const dirs = Object.keys(sched);
  if (!dirs.length) return null;
  if (dirs.length === 1) return dirs[0];

  const route  = ROUTES.find(r => r.id === routeId);
  const fromIdx = route ? route.stops.indexOf(fromStop) : -1;
  const toIdx   = route ? route.stops.indexOf(toStop)   : -1;

  if (fromIdx === -1 || toIdx === -1) return dirs[0];
  const isForward = fromIdx < toIdx;

  // Try to match by first token of direction label
  const wantStart = isForward
    ? (route.stops[0])
    : (route.stops[route.stops.length - 1]);

  return dirs.find(d => d.startsWith(wantStart)) || dirs[0];
}

// Returns up to `n` upcoming departures [{time, dayOffset}]
function getNextDepartures(routeId, fromStop, toStop, n = 4) {
  const dir = findSchedDir(routeId, fromStop, toStop);
  if (!dir) return null;
  const daySched = SCHEDULES[routeId][dir];
  if (!daySched) return null;

  const now      = getTravelTime();
  const today    = now.getDay();
  const nowMins  = now.getHours() * 60 + now.getMinutes();
  const results  = [];

  for (let off = 0; off <= 7 && results.length < n; off++) {
    const dayIdx = (today + off) % 7;
    const times  = daySched[String(dayIdx)] || [];
    for (const t of times) {
      if (results.length >= n) break;
      const [h, m] = t.split(":").map(Number);
      if (off === 0 && h * 60 + m <= nowMins) continue;
      results.push({ time: t, dayOffset: off, dayIdx });
    }
  }
  return results;
}

function renderDepartures(routeId, fromStop, toStop) {
  const deps = getNextDepartures(routeId, fromStop, toStop);
  if (!deps) return `<div class="no-sched">No timetable data — check ssl.fo</div>`;
  if (!deps.length) return `<div class="no-sched">No upcoming departures found today</div>`;

  const pills = deps.map((d, i) => {
    const dayTag = d.dayOffset === 0 ? "" :
                   d.dayOffset === 1 ? `<span class="dep-day">tomorrow</span>` :
                   `<span class="dep-day">${DAY_NAMES[d.dayIdx]}</span>`;
    return `<span class="dep-time${i === 0 ? " next" : ""}">${d.time}${dayTag}</span>`;
  }).join("");

  return `
    <div class="leg-departures-label">Next departures from ${fromStop}</div>
    ${pills}`;
}

const TYPE_LABEL = { ferry:"Ferry", bus:"Bus", express:"Express Bus", airport:"Airport Bus" };
const BASE_URL   = "https://www.ssl.fo/en/timetable/";

// ── Build stop graph ─────────────────────────────────────────────────────────
const graph = {}; // stop → [{stop, route}]

function addEdge(a, b, route) {
  (graph[a] = graph[a] || []).push({ stop: b, route });
  (graph[b] = graph[b] || []).push({ stop: a, route });
}

ROUTES.forEach(route => {
  for (let i = 0; i < route.stops.length - 1; i++) {
    addEdge(route.stops[i], route.stops[i + 1], route);
  }
});

const ALL_STOPS = Object.keys(graph).sort((a, b) => a.localeCompare(b));

// ── Populate dropdowns ───────────────────────────────────────────────────────
const fromSel = document.getElementById("from-stop");
const toSel   = document.getElementById("to-stop");

ALL_STOPS.forEach(stop => {
  [fromSel, toSel].forEach(sel => {
    const opt = document.createElement("option");
    opt.value = opt.textContent = stop;
    sel.appendChild(opt);
  });
});


// ── BFS journey planner ──────────────────────────────────────────────────────
function bfs(start, end) {
  if (start === end) return [];
  const queue   = [[start, []]];
  const visited = new Set([start]);

  while (queue.length) {
    const [cur, path] = queue.shift();
    for (const { stop, route } of (graph[cur] || [])) {
      if (visited.has(stop)) continue;
      visited.add(stop);
      const next = [...path, { from: cur, to: stop, route }];
      if (stop === end) return next;
      queue.push([stop, next]);
    }
  }
  return null;
}

// Group consecutive steps on the same route into legs
function groupLegs(steps) {
  const legs = [];
  let leg = null;
  for (const step of steps) {
    if (!leg || leg.route.id !== step.route.id) {
      if (leg) legs.push(leg);
      leg = { route: step.route, from: step.from, to: step.to, via: [] };
    } else {
      leg.via.push(leg.to);
      leg.to = step.to;
    }
  }
  if (leg) legs.push(leg);
  return legs;
}

function planJourney() {
  const from = fromSel.value;
  const to   = toSel.value;
  const out  = document.getElementById("journey-result");

  if (!from || !to) {
    out.innerHTML = `<div class="journey-error">Please select both a start and destination.</div>`;
    return;
  }
  if (from === to) {
    out.innerHTML = `<div class="journey-error">Start and destination are the same.</div>`;
    return;
  }

  const steps = bfs(from, to);

  if (!steps) {
    out.innerHTML = `<div class="journey-error">No route found between <strong>${from}</strong> and <strong>${to}</strong>. These stops may not be connected in the network.</div>`;
    return;
  }

  const legs = groupLegs(steps);
  const transfers = legs.length - 1;

  let html = `<div class="journey-summary">
    ${legs.length} leg${legs.length > 1 ? "s" : ""} ·
    ${transfers === 0 ? "No transfers" : transfers + " transfer" + (transfers > 1 ? "s" : "")}
    · <strong>${from}</strong> → <strong>${to}</strong>
  </div>`;

  legs.forEach((leg, i) => {
    const badgeCls = `badge-${leg.route.type}`;
    const viaText  = leg.via.length ? `via ${leg.via.join(" · ")}` : "";

    html += `
      <div class="leg">
        <div class="leg-badge ${badgeCls}">${leg.route.id}</div>
        <div class="leg-body">
          <div class="leg-route">${TYPE_LABEL[leg.route.type]} · ${leg.route.name.replace(/^\d+ – /, "")}</div>
          <div class="leg-direction">${leg.from} → ${leg.to}</div>
          ${viaText ? `<div class="leg-via">${viaText}</div>` : ""}
          ${leg.route.note ? `<div class="leg-note">⚠ ${leg.route.note}</div>` : ""}
          <div class="leg-departures">
            ${renderDepartures(leg.route.id, leg.from, leg.to)}
          </div>
          <a class="leg-timetable" href="${BASE_URL}${leg.route.slug}" target="_blank" rel="noopener">
            Full timetable ↗
          </a>
        </div>
      </div>`;

    if (i < legs.length - 1) {
      html += `<div class="transfer-arrow">↕ Transfer at ${leg.to}</div>`;
    }
  });

  out.innerHTML = html;
  updateMap(legs);
}

// ── Map ──────────────────────────────────────────────────────────────────────
const TYPE_COLORS = { ferry:"#4db8ff", bus:"#4dff8a", express:"#d48dff", airport:"#ffb84d" };

let leafletMap   = null;
let mapLayers    = [];

function ensureMap() {
  if (leafletMap) return;
  leafletMap = L.map("journey-map", { zoomControl: true }).setView([62.0, -6.95], 9);
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
      attribution: "Imagery © Esri, Maxar, Earthstar Geographics",
      maxZoom: 18,
    }
  ).addTo(leafletMap);
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
    { maxZoom: 18, opacity: 0.85 }
  ).addTo(leafletMap);
}

function updateMap(legs) {
  const mapEl = document.getElementById("journey-map");
  mapEl.classList.remove("hidden");

  ensureMap();
  leafletMap.invalidateSize();

  mapLayers.forEach(l => l.remove());
  mapLayers = [];

  const allBounds = [];

  legs.forEach(leg => {
    const color    = TYPE_COLORS[leg.route.type] || "#fff";
    const allStops = [leg.from, ...leg.via, leg.to];
    const coords   = allStops.map(s => COORDS[s]).filter(Boolean);

    if (coords.length >= 2) {
      // Dark halo underneath for contrast on satellite imagery
      const halo = L.polyline(coords, {
        color: "#000", weight: 8, opacity: 0.55,
        lineCap: "round", lineJoin: "round",
      }).addTo(leafletMap);
      const line = L.polyline(coords, {
        color, weight: 5, opacity: 1,
        lineCap: "round", lineJoin: "round",
        dashArray: leg.route.type === "ferry" ? "12 10" : null,
      }).addTo(leafletMap);
      mapLayers.push(halo, line);
      coords.forEach(c => allBounds.push(c));
    }

    allStops.forEach((stop, i) => {
      const coord = COORDS[stop];
      if (!coord) return;
      allBounds.push(coord);
      const isEndpoint = i === 0 || i === allStops.length - 1;
      const marker = L.circleMarker(coord, {
        radius:      isEndpoint ? 9 : 6,
        fillColor:   color,
        color:       "#fff",
        weight:      isEndpoint ? 3 : 2,
        fillOpacity: 1,
      }).bindTooltip(stop, { direction: "top", offset: [0, -6] })
        .addTo(leafletMap);
      mapLayers.push(marker);
    });
  });

  if (allBounds.length) {
    leafletMap.fitBounds(allBounds, { padding: [28, 28], maxZoom: 12 });
  }
}

// ── Full network map ─────────────────────────────────────────────────────────
function initNetworkMap() {
  const map = L.map("network-map", {
    zoomControl: true,
    minZoom: 7,
    maxZoom: 16,
  }).setView([62.0, -6.95], 9);

  // OSM-styled tiles via CARTO Voyager (works without a Referer header,
  // so it loads from file://). Swap to OSM proper if serving over http.
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution: "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors © <a href='https://carto.com/attributions'>CARTO</a>",
    subdomains: "abcd",
    maxZoom: 19,
  }).addTo(map);

  const allCoords = [];

  // Draw every route as a polyline (white halo + colored core for legibility)
  ROUTES.forEach(route => {
    const color  = TYPE_COLORS[route.type] || "#666";
    const coords = route.stops.map(s => COORDS[s]).filter(Boolean);
    if (coords.length < 2) return;

    L.polyline(coords, {
      color: "#fff", weight: 6, opacity: 0.7,
      lineCap: "round", lineJoin: "round",
    }).addTo(map);

    L.polyline(coords, {
      color, weight: 3.5, opacity: 0.95,
      lineCap: "round", lineJoin: "round",
      dashArray: route.type === "ferry" ? "10 8" : null,
    })
      .bindTooltip(route.name, { sticky: true, direction: "top" })
      .addTo(map);

    coords.forEach(c => allCoords.push(c));
  });

  // Draw every stop
  const seenStops = new Set();
  ROUTES.forEach(r => r.stops.forEach(s => seenStops.add(s)));
  seenStops.forEach(stop => {
    const c = COORDS[stop];
    if (!c) return;
    L.circleMarker(c, {
      radius: 4,
      fillColor: "#1a3a5a",
      color: "#fff",
      weight: 1.5,
      fillOpacity: 1,
    })
      .bindTooltip(stop, { direction: "top", offset: [0, -4] })
      .addTo(map);
  });

  if (allCoords.length) {
    map.fitBounds(allCoords, { padding: [40, 40] });
  }
}

function filterRoutes() {
  const q = document.getElementById("search").value.toLowerCase();
  let fc = 0, bc = 0;
  document.querySelectorAll(".route-card").forEach(c => {
    const show = !q || c.dataset.search.includes(q);
    c.classList.toggle("hidden", !show);
    if (show) c.dataset.type === "ferry" ? fc++ : bc++;
  });
  document.getElementById("ferry-count").textContent = fc;
  document.getElementById("bus-count").textContent   = bc;
  document.getElementById("ferry-section").classList.toggle("hidden", fc === 0);
  document.getElementById("bus-section").classList.toggle("hidden", bc === 0);
  document.getElementById("no-results").classList.toggle("hidden", fc + bc > 0);
}
